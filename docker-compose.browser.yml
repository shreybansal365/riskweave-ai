services:
  backend:
    environment:
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173,http://frontend-browser

  frontend-browser:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
