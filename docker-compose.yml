name: riskweave

services:
  database:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riskweave}
      POSTGRES_USER: ${POSTGRES_USER:-riskweave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskweave-local-only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - riskweave-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-RiskWeave API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-riskweave}:${POSTGRES_PASSWORD:-riskweave-local-only}@database:5432/${POSTGRES_DB:-riskweave}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  riskweave-postgres:
