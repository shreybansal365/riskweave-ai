databases:
  - name: riskweave-db-shreybansal365
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    databaseName: riskweave
    user: riskweave

services:
  - type: web
    name: riskweave-api-shreybansal365
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: off
    initialDeployHook: python -m app.cli.bootstrap_release
    envVars:
      - key: APP_NAME
        value: RiskWeave API
      - key: APP_VERSION
        value: 0.5.0
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://riskweave-ai-shreybansal365.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: riskweave-db-shreybansal365
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: AUTH_FAILURE_LIMIT
        value: "5"
      - key: AUTH_FAILURE_WINDOW_SECONDS
        value: "60"
      - key: PUBLIC_DEMO_ACCESS_ENABLED
        value: "true"
      - key: DEMO_ADMIN_EMAIL
        value: admin@riskweave.demo
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_ANALYST_EMAIL
        value: analyst@riskweave.demo
      - key: DEMO_ANALYST_PASSWORD
        sync: false
      - key: DEMO_SEED
        value: "26026"
      - key: MODEL_RANDOM_SEED
        value: "26026"
      - key: SIMULATION_EPOCH
        value: "2026-07-14T09:00:00Z"
      - key: RELEASE_BOOTSTRAP_CONFIRM
        value: baseline-v1
