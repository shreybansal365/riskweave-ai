name: RiskWeave CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_DB: riskweave
          POSTGRES_USER: riskweave
          POSTGRES_PASSWORD: riskweave-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riskweave -d riskweave"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://riskweave:riskweave-ci-only@127.0.0.1:5432/riskweave
      CORS_ORIGINS: http://localhost:4173
      RUN_DATABASE_TESTS: "1"
      JWT_SECRET: riskweave-ci-jwt-secret-at-least-32-characters
      DEMO_ADMIN_EMAIL: admin@riskweave.demo
      DEMO_ADMIN_PASSWORD: Admin-CI-Password-2026!
      DEMO_ANALYST_EMAIL: analyst@riskweave.demo
      DEMO_ANALYST_PASSWORD: Analyst-CI-Password-2026!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install --require-hashes --requirement requirements-dev.txt
      - run: pip-audit --cache-dir .cache/pip-audit --requirement requirements.txt --disable-pip
      - run: alembic upgrade head
      - run: python -m app.cli.seed_demo_users
      - run: python -m app.cli.reset_demo_data
      - run: python -m app.cli.run_scenario normal_activity
      - run: python -m app.cli.run_scenario legitimate_new_device
      - run: python -m app.cli.run_scenario account_takeover
      - run: python -m app.cli.run_benchmark
      - run: alembic check
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy app risk_engine tests
      - run: pytest

  compose:
    name: Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  e2e:
    name: Browser E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [frontend, backend, compose]
    env:
      APP_ENV: test
      POSTGRES_PASSWORD: riskweave-e2e-ci-only
      JWT_SECRET: riskweave-e2e-ci-jwt-secret-at-least-32-characters
      DEMO_ADMIN_EMAIL: admin@riskweave.demo
      DEMO_ADMIN_PASSWORD: Admin-E2E-CI-Password-2026!
      DEMO_ANALYST_EMAIL: analyst@riskweave.demo
      DEMO_ANALYST_PASSWORD: Analyst-E2E-CI-Password-2026!
      E2E_ADMIN_EMAIL: admin@riskweave.demo
      E2E_ADMIN_PASSWORD: Admin-E2E-CI-Password-2026!
      E2E_ANALYST_EMAIL: analyst@riskweave.demo
      E2E_ANALYST_PASSWORD: Analyst-E2E-CI-Password-2026!
      E2E_BASE_URL: http://localhost:4173
      E2E_API_URL: http://localhost:8000
      E2E_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: docker compose up --build -d
      - name: Wait for database-backed readiness
        run: curl --fail --retry 30 --retry-connrefused --retry-delay 2 http://localhost:8000/ready
      - run: docker compose exec -T backend python -m app.cli.seed_demo_users
      - run: npm run test:e2e:chromium
        working-directory: frontend
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: riskweave-playwright-failures
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Report composed-service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop deterministic browser stack
        if: always()
        run: docker compose down --volumes
