name: Foundation CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_DB: riskweave
          POSTGRES_USER: riskweave
          POSTGRES_PASSWORD: riskweave-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riskweave -d riskweave"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://riskweave:riskweave-ci-only@127.0.0.1:5432/riskweave
      CORS_ORIGINS: http://localhost:4173
      RUN_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install --require-hashes --requirement requirements-dev.txt
      - run: pip-audit --cache-dir .cache/pip-audit --requirement requirements.txt --disable-pip
      - run: alembic upgrade head
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy app tests
      - run: pytest

  compose:
    name: Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
